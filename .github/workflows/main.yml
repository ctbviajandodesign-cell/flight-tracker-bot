name: Daily Flight Tracker

on:
  schedule:
    # 🌅 REPORTE GENERAL 8 AM (Inicia 7:48 AM COL)
    - cron: '48 12 * * *'
    # 🕵️ GANGA 10 AM (Inicia 9:52 AM COL)
    - cron: '52 14 * * *'
    # 🕵️ GANGA 12 PM (Inicia 11:49 AM COL)
    - cron: '49 16 * * *'
    # 🌅 REPORTE GENERAL 3 PM (Inicia 2:47 PM COL)
    - cron: '47 19 * * *'
    # 🕵️ GANGA 4 PM (Inicia 3:53 PM COL)
    - cron: '53 20 * * *'
    # 🕵️ GANGA 6 PM (Inicia 5:46 PM COL)
    - cron: '46 22 * * *'
    # 🌅 REPORTE GENERAL 9 PM (Inicia 8:48 PM COL)
    - cron: '48 01 * * *'
  workflow_dispatch:
    # Permite ejecutarlo a mano desde la página web de GitHub

jobs:
  track-flights:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Flight Tracker
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
      run: python flight_tracker.py
