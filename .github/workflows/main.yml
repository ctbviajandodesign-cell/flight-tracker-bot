name: Flight Tracker Bot

on:
  schedule:
    # 8:00 AM Ecuador (corre 12:47 UTC)
    - cron: '47 12 * * *'
    # 3:00 PM Ecuador (corre 19:47 UTC)
    - cron: '47 19 * * *'
    # 8:00 PM Ecuador (corre 00:47 UTC)
    - cron: '47 00 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run flight tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
        run: python flight_tracker.py
