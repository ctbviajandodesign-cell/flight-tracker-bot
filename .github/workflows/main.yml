name: Daily Flight Tracker

on:
  schedule:
    - cron: '17 11 * * *'   # 6:17 AM Ecuador  → GENERAL (llega ~6:30 AM)
    - cron: '47 15 * * *'   # 10:47 AM Ecuador → SOLO GANGAS (llega ~11:00 AM)
    - cron: '10 20 * * *'   # 3:10 PM Ecuador  → GENERAL (llega ~3:30 PM)
    - cron: '45 21 * * *'   # 4:45 PM Ecuador  → SOLO GANGAS (llega ~5:00 PM)
  workflow_dispatch:

jobs:
  track-flights:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx
          playwright install chromium

      - name: Run Flight Tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RUN_TYPE: ${{ (github.event.schedule == '17 11 * * *' || github.event.schedule == '10 20 * * *') && 'general' || 'gangas' }}
        run: python flight_tracker.py
