name: Daily Flight Tracker

# ⏰ CONFIGURACIÓN DE HORARIOS
on:
  schedule:
    - cron: '48 12 * * *' # 🌅 8:00 AM COL/ECU
    - cron: '53 15 * * *' # 🕵️ 11:00 AM COL/ECU (Gangas)
    - cron: '47 19 * * *' # 🌅 3:00 PM COL/ECU
    - cron: '54 21 * * *' # 🕵️ 5:00 PM COL/ECU (Gangas)
    - cron: '48 01 * * *' # 🌅 9:00 PM COL/ECU
    - cron: '55 03 * * *' # 🕵️ 11:00 PM COL/ECU (Gangas)
  workflow_dispatch: # Botón para correrlo a mano

# 🏗️ PASOS PARA QUE GITHUB TRABAJE
jobs:
  track-flights:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Bajando el código de tu proyecto
        uses: actions/checkout@v4

      - name: 🐍 Preparando Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalando Herramientas (Motor y Navegador)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx  # Instalación extra por seguridad
          playwright install chromium

      - name: 🚀 Corriendo el Rastreador de Vuelos
        env:
          # Aquí es donde GitHub "pasa" tus secretos al código de Python
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
