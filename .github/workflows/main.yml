name: Flight Tracker Bot

on:
  schedule:
    # REPORTES GENERALES (EC: 8 AM, 3 PM, 9 PM)
    - cron: '47 12 * * *' # EC 8 AM (13:00 UTC)
    - cron: '47 19 * * *' # EC 3 PM (20:00 UTC)
    - cron: '47 01 * * *' # EC 9 PM (02:00 UTC)
    
    # BÚSQUEDA DE GANGAS (EC: 9 AM, 11 AM, 5 PM, 7 PM)
    - cron: '47 13 * * *' # EC 9 AM (14:00 UTC)
    - cron: '47 15 * * *' # EC 11 AM (16:00 UTC)
    - cron: '47 21 * * *' # EC 5 PM (22:00 UTC)
    - cron: '47 23 * * *' # EC 7 PM (00:00 UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      - name: Run flight tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
        run: python flight_tracker.py
