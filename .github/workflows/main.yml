name: Daily Flight Tracker

on:
  schedule:
    - cron: '17 11 * * *'   # 6:17 AM Ecuador  → general
    - cron: '47 15 * * *'   # 10:47 AM Ecuador → gangas
    - cron: '10 19 * * *'   # 2:10 PM Ecuador  → general
    - cron: '45 21 * * *'   # 4:45 PM Ecuador  → gangas
    - cron: '11 1 * * *'    # 8:11 PM Ecuador  → resumen
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Tipo de ejecución'
        required: false
        default: 'gangas'
        type: choice
        options:
          - gangas
          - general
          - resumen

jobs:
  track-flights:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Determinar RUN_TYPE
        run: |
          if [ -n "${{ github.event.inputs.run_type }}" ]; then
            echo "RUN_TYPE=${{ github.event.inputs.run_type }}" >> $GITHUB_ENV
          else
            case "${{ github.event.schedule }}" in
              "17 11 * * *"|"10 19 * * *") echo "RUN_TYPE=general" >> $GITHUB_ENV ;;
              "11 1 * * *")                echo "RUN_TYPE=resumen" >> $GITHUB_ENV ;;
              *)                           echo "RUN_TYPE=gangas"  >> $GITHUB_ENV ;;
            esac
          fi

      - name: Run Flight Tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RUN_TYPE: ${{ env.RUN_TYPE }}
        run: python flight_tracker.py
