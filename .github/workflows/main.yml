name: Daily Flight Tracker

on:
  schedule:
    # Corre todos los días a las 08:00 AM UTC (que es 3:00 AM en Ecuador/Panamá/Colombia)
    # Cambia esto por '0 13 * * *' para que corra a las 08:00 AM hora local (UTC-5)
    - cron: '50 19 * * *'
  workflow_dispatch:
    # Permite ejecutarlo a mano desde la página web de GitHub

jobs:
  track-flights:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Flight Tracker
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
      run: python flight_tracker.py
