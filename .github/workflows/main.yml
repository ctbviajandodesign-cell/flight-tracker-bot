name: Daily Flight Tracker

on:
  schedule:
    - cron: '17 11 * * *'   # 6:17 AM Ecuador  → general
    - cron: '47 15 * * *'   # 10:47 AM Ecuador → gangas
    - cron: '10 19 * * *'   # 2:10 PM Ecuador  → general
    - cron: '45 21 * * *'   # 4:45 PM Ecuador  → gangas
    - cron: '0 1 * * *'     # 8:00 PM Ecuador  → resumen
    - cron: '0 4 * * *'     # 11:00 PM Ecuador → resumen
  workflow_dispatch:

jobs:
  track-flights:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx
          playwright install chromium

      - name: Determinar RUN_TYPE por hora Ecuador
        run: |
          HOUR=$(TZ=America/Guayaquil date +%-H)
          if [ "$HOUR" -eq 6 ] || [ "$HOUR" -eq 14 ]; then
            echo "RUN_TYPE=general" >> $GITHUB_ENV
          elif [ "$HOUR" -eq 20 ] || [ "$HOUR" -eq 23 ]; then
            echo "RUN_TYPE=resumen" >> $GITHUB_ENV
          else
            echo "RUN_TYPE=gangas" >> $GITHUB_ENV
          fi

      - name: Run Flight Tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RUN_TYPE: ${{ env.RUN_TYPE }}
        run: python flight_tracker.py
