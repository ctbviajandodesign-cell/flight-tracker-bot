name: Daily Flight Tracker

on:
  schedule:
    # ✈️ REPORTE GENERAL MAÑANA: Arranca 7:47 AM para llegar exacto ~8:00 AM (A tu Telegram)
    - cron: '47 12 * * *'
    # 🕵️ Silencioso: 10:17 AM
    - cron: '17 15 * * *'
    # 🕵️ Silencioso: 12:17 PM
    - cron: '17 17 * * *'
    # ✈️ REPORTE GENERAL TARDE: Arranca 2:47 PM para llegar exacto ~3:00 PM
    - cron: '47 19 * * *'
    # 🕵️ Silencioso: 4:17 PM
    - cron: '17 21 * * *'
    # 🕵️ Silencioso Final: 6:17 PM
    - cron: '17 23 * * *'
  workflow_dispatch:
    # Permite ejecutarlo a mano desde la página web de GitHub

jobs:
  track-flights:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Flight Tracker
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
      run: python flight_tracker.py
