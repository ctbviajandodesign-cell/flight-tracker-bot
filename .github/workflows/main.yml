name: Daily Flight Tracker

on:
  schedule:
    # 🌅 REPORTE GENERAL 8 AM (Inicia 7:48 AM COL)
    - cron: '48 12 * * *'
    # 🕵️ GANGA MAÑANA 11 AM (Inicia 10:53 AM COL)
    - cron: '53 15 * * *'
    # 🌅 REPORTE GENERAL 3 PM (Inicia 2:47 PM COL)
    - cron: '47 19 * * *'
    # 🕵️ GANGA TARDE 5 PM (Inicia 4:54 PM COL)
    - cron: '54 21 * * *'
    # 🌅 REPORTE GENERAL 9 PM (Inicia 8:48 PM COL)
    - cron: '48 01 * * *'
    # 🕵️ GANGA NOCHE 11 PM (Inicia 10:55 PM COL)
    - cron: '55 03 * * *'
  workflow_dispatch:
    # Permite ejecutarlo a mano desde la página web de GitHub

jobs:
  track-flights:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Flight Tracker
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
      run: python flight_tracker.py
