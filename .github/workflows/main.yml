name: Daily Flight Tracker

on:
  schedule:
    # ✈️ REPORTE GENERAL MAÑANA: Cron 7:00 AM UTC → llega ~8:00 AM Colombia
    - cron: '12 12 * * *'
    # 🕵️ Silencioso: 9:00 AM Colombia
    - cron: '12 14 * * *'
    # 🕵️ Silencioso: 11:00 AM Colombia
    - cron: '12 16 * * *'
    # ✈️ REPORTE GENERAL TARDE: Cron 1:00 PM UTC → llega ~2:00 PM Colombia
    - cron: '12 18 * * *'
    # 🕵️ Silencioso: 3:00 PM Colombia
    - cron: '12 20 * * *'
    # 🕵️ Silencioso Final: 5:00 PM Colombia
    - cron: '12 22 * * *'
  workflow_dispatch:
    # Permite ejecutarlo a mano desde la página web de GitHub

jobs:
  track-flights:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Flight Tracker
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GOOGLE_SHEETS_URL: ${{ secrets.GOOGLE_SHEETS_URL }}
      run: python flight_tracker.py
